image:
  repository: "public.ecr.aws/g3x2k6s4/kscu"
  tag: "1.6"
  pullPolicy: IfNotPresent

taintKey: "example.com/kubelet-no-server-cert"
checkInterval: 5
logLevel: 4

resources:
  limits:
    cpu: 10m
    memory: 80Mi
  requests:
    cpu: 10m
    memory: 80Mi

nodeAffinity: {}

tolerations:
  - effect: NoSchedule
    operator: Exists
  - effect: NoExecute
    operator: Exists
